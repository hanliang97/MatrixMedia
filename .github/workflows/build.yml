name: Upload Electron Package

on:
  push:
    branches:
      - prod

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.15.1'
      - name: Extract repository name
        id: extract-repo-name
        run: |
          OWNER_NAME=$(echo "${{ github.repository }}" | awk -F '/' '{print $1}')
          REPO_NAME=$(echo "${{ github.repository }}" | awk -F '/' '{print $2}')
          echo "owner-name=$OWNER_NAME" >> $GITHUB_OUTPUT
          echo "repo-name=$REPO_NAME" >> $GITHUB_OUTPUT
        shell: bash
      - name: Install dependencies
        run: yarn
      - name: Build Electron app (Windows)
        run: yarn build
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/MatrixMedia-*-win-*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.15.1'
      - name: Install dependencies
        run: yarn
      - name: Build Electron app (macOS Intel + Apple Silicon)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: yarn build:mac
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: build/MatrixMedia-*-mac-*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.15.1'
      - name: Install dependencies
        run: yarn
      - name: Build Electron app (Linux x64 AppImage)
        run: yarn build:linux
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: build/MatrixMedia-*-linux-*.AppImage

  release-github:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Read version from package.json
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Generate release notes
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: node scripts/gen-release-notes.js
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-gh
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          body_path: release-notes.md
          files: |
            dist-gh/**/*.exe
            dist-gh/**/*.dmg
            dist-gh/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      version: ${{ steps.ver.outputs.version }}

  # 同步到 Gitee。直接复用同一 workflow run 的 build artifacts(不重新打包),
  # 这样如果 Gitee 上传失败,只需在 Actions 页面 "Re-run failed jobs" 重跑此 job 即可,
  # 不会触发 build-windows / build-mac / build-linux 重新打包。
  # 注: artifacts 默认保留 90 天,期间随时可重跑此 job。
  # 若超期或想"重新同步某个旧 tag",请改用 .github/workflows/sync-gitee.yml 手动触发。
  release-gitee:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.15.1'
      - name: Read version from package.json
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Generate release notes
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: node scripts/gen-release-notes.js
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true
      - name: Install dependencies
        run: yarn
      - name: Upload to Gitee Release
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # 仅上传 exe / dmg(Gitee 单文件 100MB 上限,Linux AppImage 不上传)
          mapfile -t files < <(find dist-release -type f \( -name '*.exe' -o -name '*.dmg' \) | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .exe or .dmg under dist-release"; ls -laR dist-release; exit 1
          fi
          RELEASE_BODY="$(cat release-notes.md 2>/dev/null || true)" \
            node upload-gitee.js "${{ secrets.GITEE_ACCESS_TOKEN }}" "$VERSION" "${files[@]}"

