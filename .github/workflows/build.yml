name: Upload Electron Package

on:
  push:
    branches:
      - prod

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.15.1'
      - name: Extract repository name
        id: extract-repo-name
        run: |
          OWNER_NAME=$(echo "${{ github.repository }}" | awk -F '/' '{print $1}')
          REPO_NAME=$(echo "${{ github.repository }}" | awk -F '/' '{print $2}')
          echo "owner-name=$OWNER_NAME" >> $GITHUB_OUTPUT
          echo "repo-name=$REPO_NAME" >> $GITHUB_OUTPUT
        shell: bash
      - name: Install dependencies
        run: yarn
      - name: Build Electron app (Windows)
        run: yarn build
      - name: Rename Windows installer
        shell: pwsh
        run: |
          $pkg = Get-Content -Raw -Encoding UTF8 package.json | ConvertFrom-Json
          $v = $pkg.version
          $p = $pkg.build.productName
          $from = Join-Path 'build' ($p + ' Setup ' + $v + '.exe')
          $to = Join-Path 'build' ('Setup-' + $v + '-win-x64.exe')
          Move-Item -LiteralPath $from -Destination $to
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/Setup-*-win-x64.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.15.1'
      - name: Install dependencies
        run: yarn
      - name: Build Electron app (macOS Intel + Apple Silicon)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: yarn build:mac
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: build/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.15.1'
      - name: Install dependencies
        run: yarn
      - name: Build Electron app (Linux x64 AppImage)
        run: yarn build:linux
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: build/*.AppImage

  release-github:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Read version from package.json
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Generate release notes
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: node scripts/gen-release-notes.js
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-gh
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          body_path: release-notes.md
          files: |
            dist-gh/**/*.exe
            dist-gh/**/*.dmg
            dist-gh/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

