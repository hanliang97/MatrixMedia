name: Upload Electron Package

on:
  push:
    branches:
      - prod

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.15.1'
      - name: Extract repository name
        id: extract-repo-name
        run: |
          OWNER_NAME=$(echo "${{ github.repository }}" | awk -F '/' '{print $1}')
          REPO_NAME=$(echo "${{ github.repository }}" | awk -F '/' '{print $2}')
          echo "owner-name=$OWNER_NAME" >> $GITHUB_OUTPUT
          echo "repo-name=$REPO_NAME" >> $GITHUB_OUTPUT
        shell: bash
      - name: Install dependencies
        run: yarn
      - name: Build Electron app (Windows)
        run: yarn build
      - name: Rename Windows installer
        shell: pwsh
        run: |
          $pkg = Get-Content -Raw -Encoding UTF8 package.json | ConvertFrom-Json
          $v = $pkg.version
          $p = $pkg.build.productName
          $from = Join-Path 'build' ($p + ' Setup ' + $v + '.exe')
          $to = Join-Path 'build' ('Setup-' + $v + '-win-x64.exe')
          Move-Item -LiteralPath $from -Destination $to
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/Setup-*-win-x64.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.15.1'
      - name: Install dependencies
        run: yarn
      - name: Build Electron app (macOS Intel + Apple Silicon)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: yarn build:mac
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: build/*.dmg

  release-github:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Read version from package.json
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Generate release notes
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        shell: bash
        run: |
          CURRENT_TAG="v${VERSION}"
          MAJOR=$(echo "$VERSION" | awk -F. '{print $1}')
          MINOR=$(echo "$VERSION" | awk -F. '{print $2}')
          PATCH=$(echo "$VERSION" | awk -F. '{print $3}')

          TITLE="## 更新记录"
          RANGE_LABEL="全部历史..HEAD"
          RANGE_START=""

          # minor/major 发布（patch=0）时，优先按“上一个 minor 起点标签”统计
          if [ "$PATCH" = "0" ] && [ -n "$MINOR" ] && [ "$MINOR" -gt 0 ] 2>/dev/null; then
            PREV_MINOR=$((MINOR - 1))
            CANDIDATE="v${MAJOR}.${PREV_MINOR}.0"
            if git rev-parse -q --verify "refs/tags/${CANDIDATE}" >/dev/null; then
              RANGE_START="$CANDIDATE"
              TITLE="## 大版本更新日志"
            fi
          fi

          # 回退：按最近一个非当前标签统计
          if [ -z "$RANGE_START" ]; then
            mapfile -t TAGS < <(git tag --sort=-version:refname 'v*')
            for TAG in "${TAGS[@]}"; do
              if [ "$TAG" != "$CURRENT_TAG" ]; then
                RANGE_START="$TAG"
                break
              fi
            done
          fi

          if [ -n "$RANGE_START" ]; then
            RANGE_LABEL="${RANGE_START}..HEAD"
            COMMITS=$(git log "${RANGE_START}..HEAD" --pretty=format:"- %s (%h)" --grep='^chore(release): v' --invert-grep)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --grep='^chore(release): v' --invert-grep)
          fi
          if [ -z "$COMMITS" ]; then
            COMMITS="- 无更新记录"
          fi
          {
            echo "$TITLE"
            echo
            echo "对比范围: ${RANGE_LABEL}"
            echo
            echo "$COMMITS"
          } > release-notes.md
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-gh
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          body_path: release-notes.md
          files: |
            dist-gh/**/*.exe
            dist-gh/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-gitee:
    # 同步 Windows 安装包与 macOS DMG（注意 Gitee 单文件约 100MB 上限）
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.15.1'
      - name: Read version from package.json
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true
      - name: Install dependencies
        run: yarn
      - name: Generate release notes
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        shell: bash
        run: |
          CURRENT_TAG="v${VERSION}"
          MAJOR=$(echo "$VERSION" | awk -F. '{print $1}')
          MINOR=$(echo "$VERSION" | awk -F. '{print $2}')
          PATCH=$(echo "$VERSION" | awk -F. '{print $3}')

          TITLE="## 更新记录"
          RANGE_LABEL="全部历史..HEAD"
          RANGE_START=""

          # minor/major 发布（patch=0）时，优先按“上一个 minor 起点标签”统计
          if [ "$PATCH" = "0" ] && [ -n "$MINOR" ] && [ "$MINOR" -gt 0 ] 2>/dev/null; then
            PREV_MINOR=$((MINOR - 1))
            CANDIDATE="v${MAJOR}.${PREV_MINOR}.0"
            if git rev-parse -q --verify "refs/tags/${CANDIDATE}" >/dev/null; then
              RANGE_START="$CANDIDATE"
              TITLE="## 大版本更新日志"
            fi
          fi

          # 回退：按最近一个非当前标签统计
          if [ -z "$RANGE_START" ]; then
            mapfile -t TAGS < <(git tag --sort=-version:refname 'v*')
            for TAG in "${TAGS[@]}"; do
              if [ "$TAG" != "$CURRENT_TAG" ]; then
                RANGE_START="$TAG"
                break
              fi
            done
          fi

          if [ -n "$RANGE_START" ]; then
            RANGE_LABEL="${RANGE_START}..HEAD"
            COMMITS=$(git log "${RANGE_START}..HEAD" --pretty=format:"- %s (%h)" --grep='^chore(release): v' --invert-grep)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --grep='^chore(release): v' --invert-grep)
          fi
          if [ -z "$COMMITS" ]; then
            COMMITS="- 无更新记录"
          fi
          {
            echo "$TITLE"
            echo
            echo "对比范围: ${RANGE_LABEL}"
            echo
            echo "$COMMITS"
          } > release-notes.md
      - name: Upload to Gitee Release
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mapfile -t files < <(find dist-release -type f \( -name '*.exe' -o -name '*.dmg' \) | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .exe or .dmg under dist-release"; ls -laR dist-release; exit 1
          fi
          RELEASE_BODY="$(cat release-notes.md)" node upload-gitee.js "${{ secrets.GITEE_ACCESS_TOKEN }}" "$VERSION" "${files[@]}"
